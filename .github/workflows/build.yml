name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly rebuild at 06:00 UTC on Sunday to pick up upstream updates
    - cron: "0 6 * * 0"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Upstream change detection ──────────────────────────────────────
      # Fetch the latest HEAD SHA from the upstream repo and compare it
      # with the SHA we built last time (cached via actions/cache).
      # If the SHA hasn't changed and this is a scheduled run, skip the
      # expensive Docker build entirely.
      - name: Get upstream HEAD SHA
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/ServeurpersoCom/qwentts.cpp.git HEAD | cut -f1)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "Upstream HEAD: ${SHA}"

      - name: Restore last-built upstream SHA
        id: sha-cache
        uses: actions/cache@v4
        with:
          path: .last_upstream_sha
          key: upstream-sha-${{ steps.upstream.outputs.sha }}

      - name: Should we build?
        id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Triggered by ${{ github.event_name }}, building unconditionally"
            echo "build=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.sha-cache.outputs.cache-hit }}" == "true" ]; then
            echo "Upstream unchanged (${{ steps.upstream.outputs.sha }}), skipping build"
            echo "build=false" >> $GITHUB_OUTPUT
          else
            echo "New upstream SHA ${{ steps.upstream.outputs.sha }}, building"
            echo "build=true" >> $GITHUB_OUTPUT
          fi

      # ── Docker build ──────────────────────────────────────────────────
      - name: Set up Docker Buildx
        if: steps.decide.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.decide.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.decide.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            UPSTREAM_SHA=${{ steps.upstream.outputs.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/qwen3-tts:latest
            ghcr.io/${{ github.repository_owner }}/qwen3-tts:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Persist the upstream SHA so the next scheduled run can compare.
      # The actions/cache post-action automatically saves this file when
      # the cache key doesn't already exist (i.e. on a new SHA).
      - name: Mark SHA as built
        if: steps.decide.outputs.build == 'true'
        run: echo "${{ steps.upstream.outputs.sha }}" > .last_upstream_sha