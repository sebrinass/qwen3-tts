name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily rebuild at 06:00 UTC to pick up upstream model/driver updates
    - cron: "0 6 * * *"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qwen3-tts:latest
            ghcr.io/${{ github.repository_owner }}/qwen3-tts:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
